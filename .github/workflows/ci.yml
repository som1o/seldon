name: ci

on:
  push:
  pull_request:

jobs:
  build-and-security:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -S . -B build -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build -j2

      - name: Security Regression Gate
        run: cmake --build build --target security_regression_gate
